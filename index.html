<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1>Weather App</h1>
        <p class="subtitle">Search for a city to see its current weather.</p>
      </header>

      <main class="app-main">
        <section class="search-section">
          <form id="search-form" class="search-form" autocomplete="off">
            <input
              type="text"
              id="city-input"
              class="search-input"
              placeholder="Enter city..."
              aria-label="City name"
              required
            />
            <button type="submit" class="btn primary">Search</button>
          </form>
        </section>

        <section class="status-section">
          <p id="loading" class="status-message hidden">Loading weather data...</p>
          <p id="error" class="status-message error hidden"></p>
        </section>

        <section id="weather-card" class="weather-card hidden" aria-live="polite">
          <div class="weather-header">
            <div>
              <h2 id="city-name" class="city-name">City</h2>
              <p id="country" class="country">Country</p>
            </div>
            <div class="weather-main">
              <span id="temperature" class="temperature">--°C</span>
              <button
                type="button"
                id="unit-toggle"
                class="btn ghost unit-toggle"
                aria-label="Toggle temperature unit"
              >
                °C / °F
              </button>
            </div>
          </div>

          <div class="weather-body">
            <div class="weather-primary">
              <img
                id="weather-icon"
                class="weather-icon"
                src=""
                alt=""
                loading="lazy"
              />
              <p id="description" class="description">Weather description</p>
            </div>

            <div class="weather-details">
              <div class="detail">
                <span class="label">Humidity</span>
                <span id="humidity" class="value">--%</span>
              </div>
              <div class="detail">
                <span class="label">Wind Speed</span>
                <span id="wind" class="value">-- m/s</span>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <small>
          Data by
          <a
            href="https://openweathermap.org/"
            target="_blank"
            rel="noopener noreferrer"
          >
            OpenWeatherMap
          </a>
        </small>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
